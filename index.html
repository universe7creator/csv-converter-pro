<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Converter Pro - Professional Data Transformation</title>
    <meta name="description" content="Convert CSV to JSON, Markdown, HTML, SQL instantly. Professional data transformation tool with privacy-first local processing. $19 one-time.">
    <meta property="og:title" content="CSV Converter Pro — Professional Data Transformation">
    <meta property="og:description" content="Convert CSV to JSON, Markdown, HTML, SQL instantly. Privacy-first local processing.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #111111 50%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e94560;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #a0a0a0; font-size: 1.2em; }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .panel h2 { color: #e94560; margin-bottom: 15px; font-size: 1.3em; }
        textarea {
            width: 100%;
            height: 300px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #e94560; }
        .controls {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .control-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .control-group { flex: 1; min-width: 200px; }
        label { display: block; color: #a0a0a0; margin-bottom: 5px; font-size: 0.9em; }
        select, input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn-primary {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #e94560;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .stat-value { font-size: 2em; font-weight: bold; color: #e94560; }
        .stat-label { color: #a0a0a0; font-size: 0.9em; }
        footer {
            text-align: center;
            padding: 30px;
            color: #a0a0a0;
            border-top: 1px solid rgba(233, 69, 96, 0.2);
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CSV Converter Pro</h1>
            <p class="subtitle">Professional Data Transformation Tool | JSON ↔ CSV ↔ TSV ↔ Markdown ↔ HTML ↔ SQL</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="rowCount">0</div>
                <div class="stat-label">Rows</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="colCount">0</div>
                <div class="stat-label">Columns</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="cellCount">0</div>
                <div class="stat-label">Cells</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="fileSize">0KB</div>
                <div class="stat-label">Size</div>
            </div>
        </div>

        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label>Input Format</label>
                    <select id="inputFormat">
                        <option value="csv">CSV</option>
                        <option value="tsv">TSV</option>
                        <option value="json">JSON</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Output Format</label>
                    <select id="outputFormat">
                        <option value="json">JSON</option>
                        <option value="csv">CSV</option>
                        <option value="tsv">TSV</option>
                        <option value="markdown">Markdown</option>
                        <option value="html">HTML</option>
                        <option value="sql">SQL</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Delimiter</label>
                    <select id="delimiter">
                        <option value="auto">Auto-detect</option>
                        <option value=",">Comma (,)</option>
                        <option value="\t">Tab</option>
                        <option value=";">Semicolon (;)</option>
                        <option value="|">Pipe (|)</option>
                    </select>
                </div>
            </div>
            <div class="control-row">
                <button class="btn btn-primary" onclick="convert()">Convert</button>
                <button class="btn btn-secondary" onclick="copyOutput()">Copy</button>
                <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
                <button class="btn btn-secondary" onclick="loadSample()">Load Sample</button>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <h2>Input</h2>
                <textarea id="input" placeholder="Paste your CSV, JSON, or TSV data here..."></textarea>
            </div>
            <div class="panel">
                <h2>Output</h2>
                <textarea id="output" readonly placeholder="Converted output will appear here...
